<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>モックB: 生存リスト分割</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f0f9ff; min-height: 100vh; padding-bottom: 5rem; }
  .header { background: linear-gradient(135deg,#2563eb,#1d4ed8); padding: 1rem; text-align: center; color: white; border-radius: 0 0 20px 20px; margin-bottom: 0.75rem; }
  .header h1 { font-size: 18px; }
  .header p { font-size: 12px; opacity: 0.85; margin-top: 4px; }
  .nav { text-align:center; padding: 0.5rem; font-size: 12px; }
  .nav a { color: #2563eb; margin: 0 8px; text-decoration: none; font-weight: 600; }
  .wrap { padding: 0 0.75rem; max-width: 520px; margin: 0 auto; }

  .note { background: #fef3c7; border-radius: 10px; padding: 8px 12px; font-size: 12px; color: #92400e; margin-bottom: 0.75rem; }

  .court { background: white; border-radius: 16px; margin-bottom: 0.75rem; border: 2px solid #e0e7ff; overflow: hidden; }
  .court-half { padding: 0.75rem; }
  .court-half.a { border-bottom: 3px dashed #fbbf24; background: linear-gradient(180deg,#fff5f5,#ffffff); }
  .court-half.b { background: linear-gradient(0deg,#f0f7ff,#ffffff); }
  .half-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; font-weight: 700; }
  .half-header.a { color: #991b1b; }
  .half-header.b { color: #1e40af; }
  .alive-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 700; }
  .alive-badge.a { background: #fee2e2; color: #991b1b; }
  .alive-badge.b { background: #dbeafe; color: #1e40af; }

  .alive-grid { display: flex; flex-wrap: wrap; gap: 6px; min-height: 60px; }
  .alive-chip { display: flex; align-items: center; gap: 6px; padding: 8px 4px 8px 12px; border-radius: 22px; font-weight: 700; font-size: 14px; border: 2px solid; cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none; transition: transform 0.1s; }
  .alive-chip:active { transform: scale(0.94); }
  .alive-chip.a { background: #fff1f2; border-color: #fca5a5; color: #991b1b; }
  .alive-chip.b { background: #eff6ff; border-color: #93c5fd; color: #1e40af; }
  .alive-chip .hit-mini { font-size: 11px; padding: 1px 8px; border-radius: 10px; background: rgba(255,255,255,0.7); }
  .hit-plus { width: 26px; height: 26px; border-radius: 50%; border: none; font-size: 16px; font-weight: 700; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .hit-plus.a { background: #fca5a5; color: white; }
  .hit-plus.b { background: #93c5fd; color: white; }
  .hit-plus:active { transform: scale(0.85); }

  .out-zone { padding: 8px 12px; background: #f9fafb; min-height: 44px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; border-top: 1px solid #f3f4f6; }
  .out-label { font-size: 10px; font-weight: 700; color: #9ca3af; margin-right: 6px; }
  .out-mini { font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 14px; background: white; border: 1px solid #e5e7eb; color: #6b7280; text-decoration: line-through; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .out-mini:active { transform: scale(0.92); }

  .finish-btn { width: calc(100% - 1.5rem); margin: 0 0.75rem; padding: 14px; border-radius: 50px; border: none; background: linear-gradient(135deg,#f97316,#ef4444); color: white; font-size: 16px; font-weight: 700; box-shadow: 0 4px 14px rgba(249,115,22,0.35); cursor: pointer; max-width: 504px; display: block; }
</style>
</head>
<body>

<div class="header">
  <h1>⚽ 第1試合（モックB：生存リスト）</h1>
  <p>生きてる子は大きく上に、退場した子は下に小さく</p>
</div>

<div class="nav">
  <a href="mock-a.html">A</a>
  <a href="mock-b.html">[ B ]</a>
  <a href="mock-c.html">C</a>
</div>

<div class="wrap">
<div class="note">💡 名前タップ＝退場 / 横の「＋」ボタンで当てた数を加算 / 退場した子をタップ＝復活</div>

<div class="court">
  <div class="court-half a">
    <div class="half-header a"><span>🔴 チームA</span><span class="alive-badge a" id="badge-a">生存 5/5</span></div>
    <div class="alive-grid" id="alive-a"></div>
    <div class="out-zone" id="out-a"><span class="out-label">退場</span></div>
  </div>
  <div class="court-half b">
    <div class="half-header b"><span>🔵 チームB</span><span class="alive-badge b" id="badge-b">生存 5/5</span></div>
    <div class="alive-grid" id="alive-b"></div>
    <div class="out-zone" id="out-b"><span class="out-label">退場</span></div>
  </div>
</div>

<button class="finish-btn">試合終了 → 勝敗を記録</button>
</div>

<script>
const teamA = ['たろう','じろう','さぶろう','しろう','ごろう'];
const teamB = ['はなこ','ようこ','みちこ','けいこ','れいこ'];
const state = {};
[...teamA, ...teamB].forEach(n => state[n] = { out: false, hit: 0 });

function el(id) { return document.getElementById(id); }

function render() {
  ['a','b'].forEach(t => {
    const list = t === 'a' ? teamA : teamB;
    const alive = el('alive-' + t);
    const out = el('out-' + t);
    alive.innerHTML = '';
    out.innerHTML = '<span class="out-label">退場</span>';
    list.forEach(name => {
      const s = state[name];
      if (s.out) {
        const c = document.createElement('span');
        c.className = 'out-mini';
        c.textContent = name + (s.hit ? ` ⚡${s.hit}` : '');
        c.onclick = () => { s.out = false; render(); };
        out.appendChild(c);
      } else {
        const c = document.createElement('div');
        c.className = 'alive-chip ' + t;
        c.innerHTML = `<span style="flex:1">${name}</span>${s.hit ? `<span class="hit-mini">⚡${s.hit}</span>` : ''}<button class="hit-plus ${t}">+</button>`;
        c.onclick = (e) => {
          if (e.target.classList.contains('hit-plus')) return;
          s.out = true; render();
        };
        c.querySelector('.hit-plus').onclick = (e) => {
          e.stopPropagation();
          s.hit++;
          render();
        };
        alive.appendChild(c);
      }
    });
    const oCount = list.filter(n => state[n].out).length;
    el('badge-' + t).textContent = `生存 ${list.length - oCount}/${list.length}`;
  });
}

render();
</script>
</body>
</html>
